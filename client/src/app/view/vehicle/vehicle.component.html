<div class="page-wrap store-page section-space">
  <div id="carouselExampleControls" class="carousel slide store-hero" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-inner">
      <div *ngFor="let img of sliderImages; let i = index" class="carousel-item" [class.active]="i === 0">
        <img [src]="img" alt="Slider image">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <h1 class="page-title">Shop Vehicles</h1>
  <p class="page-subtitle section-intro">Choose from luxury sedans, SUVs, and performance cars.</p>

  <div class="store-grid">
    <article class="store-card" *ngFor="let vehicle of vehicles">
      <div class="store-card-image"><img [src]="vehicle.image" [alt]="vehicle.itemname"></div>
      <span class="store-card-title">{{ vehicle.itemname }}</span>
      <span class="store-card-price">Rs.{{ vehicle.itemprice | number }}</span>
      <div class="card-actions">
        <button routerLink="/item/{{vehicle.id}}" class="preview-btn">Preview</button>
        <button type="button" class="add-to-cart-quick" [disabled]="!vehicle.id" (click)="addToCartQuick(vehicle.id)">Add to Cart</button>
      </div>
    </article>
  </div>
</div>
