<div class="auth-page">
  <div class="page-wrap">
    <mat-card class="example-card auth-card">
      <mat-card-header class="auth-header">
        <div mat-card-avatar></div>
        <mat-card-title>Register Here</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form #signupForm=ngForm (ngSubmit)="onSubmit()" class="form-shell">
          <div class="example-container">
            <mat-form-field appearance="outline">
              <mat-label>Enter your email</mat-label>
              <input type="email" matInput name="email" [(ngModel)]="form.email" required>
              <mat-hint>madawa@gmail.com</mat-hint>
            </mat-form-field>
            <mat-dialog-content [hidden]="!error.email" class="error-box">{{error.email}}</mat-dialog-content>

            <mat-form-field appearance="outline">
              <mat-label>Enter your name</mat-label>
              <input matInput type="text" name="name" [(ngModel)]="form.name" required>
              <mat-hint>Saman Silva</mat-hint>
            </mat-form-field>
            <mat-dialog-content [hidden]="!error.name" class="error-box">{{error.name}}</mat-dialog-content>
          </div>

          <div class="example-container">
            <mat-form-field appearance="outline">
              <mat-label>Enter your password</mat-label>
              <input matInput [type]="hide ? 'password' : 'text'" name="=password" [(ngModel)]="form.password" required>
              <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>
            <mat-dialog-content [hidden]="!error.password" class="error-box">{{error.password}}</mat-dialog-content>

            <mat-form-field appearance="outline">
              <mat-label>Confirm password</mat-label>
              <input matInput [type]="hide2 ? 'password' : 'text'" name="=password_confirmation" [(ngModel)]="form.password_confirmation" required>
              <button mat-icon-button matSuffix (click)="hide2 = !hide2" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide2">
                <mat-icon>{{hide2 ? 'visibility_off' : 'visibility'}}</mat-icon>
              </button>
            </mat-form-field>
          </div>

          <mat-card-actions class="action-row" type="button">
            <button mat-button mat-raised-button color="primary" [disabled]="!signupForm.valid">Sign up</button>
            <button mat-button mat-raised-button color="accent" type="button" routerLink="/login">Sign in</button>
          </mat-card-actions>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
