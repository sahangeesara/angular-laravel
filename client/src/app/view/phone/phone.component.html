<div class="page-wrap store-page section-space">

  <div id="carouselExampleControls" class="carousel slide store-hero" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-inner">
      <div *ngFor="let img of sliderImages; let i = index" class="carousel-item" [class.active]="i === 0">
        <img [src]="img" class="d-block w-100" alt="Slider image">
      </div>
    </div>
    <ng-container *ngIf="sliderImages.length > 1">
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </ng-container>
  </div>

  <header class="text-center my-5">
    <h1 class="page-title">Shop Phones</h1>
    <p class="page-subtitle section-intro">Find your next smartphone with balanced performance and pricing.</p>
  </header>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="container" *ngIf="!isLoading">
    <div class="store-grid" *ngIf="phones.length > 0; else noPhones">
      <article class="store-card" *ngFor="let phone of phones">
        <div class="store-card-image">
          <img [src]="phone.image_url || 'assets/placeholder-phone.jpg'" [alt]="phone.itemname">
        </div>

        <div class="store-card-body">
          <span class="store-card-title">{{ phone.itemname }}</span> <br>
          <span class="store-card-price">Rs. {{ phone.itemprice | number }}</span>

          <div class="card-actions">
            <button type="button" [routerLink]="['/item', phone.id]" class="preview-btn">
              Preview
            </button>
            <button type="button"
                    class="add-to-cart-quick"
                    [disabled]="!phone.id"
                    (click)="addToCartQuick(phone.id)">
              Add to Cart
            </button>
          </div>
        </div>
      </article>
    </div>

    <ng-template #noPhones>
      <div class="text-center my-5 py-5">
        <i class="bi bi-phone-mute fs-1 text-muted"></i>
        <h3 class="mt-3">No smartphones available right now.</h3>
        <p class="text-muted">Please check back later or browse other categories.</p>
      </div>
    </ng-template>
  </div>
</div>
