<div class="page-wrap store-page section-space">
  <div id="carouselExampleControls" class="carousel slide store-hero" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-inner">
      <div *ngFor="let img of sliderImages; let i = index" class="carousel-item" [class.active]="i === 0">
        <img [src]="img" alt="Slider image" width="200" height="100">
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>

  <h1 class="page-title">Shop Laptops</h1>
  <p class="page-subtitle section-intro">Portable machines for study, office, and high-performance gaming.</p>

  <div class="store-grid">
    <article class="store-card" *ngFor="let laptop of laptops">
      <div class="store-card-image"><img [src]="laptop.image_url || 'assets/placeholder-laptop.jpg'" [alt]="laptop.itemname" width="200" height="100"></div>
      <span class="store-card-title">{{ laptop.itemname }}</span>
      <span class="store-card-price">Rs.{{ laptop.itemprice | number }}</span>
      <div class="card-actions">
        <button routerLink="/item/{{laptop.id}}" class="preview-btn">Preview</button>
        <button type="button" class="add-to-cart-quick" [disabled]="!laptop.id" (click)="addToCartQuick(laptop.id)">Add to Cart</button>
      </div>
    </article>
  </div>
</div>
