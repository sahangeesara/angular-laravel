<div *ngIf="loading">Loading items...</div>
<div *ngIf="error">{{ error }}</div>
<table *ngIf="!loading && !error">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Price</th>
      <th>Code</th>
      <th>Description</th>
      <th>Image</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of items">
      <td>{{ item.id }}</td>
      <td>{{ item.itemname }}</td>
      <td>{{ item.itemprice }}</td>
      <td>{{ item.itemcode }}</td>
      <td>{{ item.description }}</td>
      <td>
        <img *ngIf="item.image" [src]="item.image" alt="item image" width="60" />
      </td>
    </tr>
  </tbody>
</table>
